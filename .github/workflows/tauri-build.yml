name: Tauri Desktop Build

on:
  push:
    branches: ['**']
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'package.json'
      - 'rust-toolchain.toml'
      - '.github/workflows/tauri-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'package.json'
      - 'rust-toolchain.toml'
      - '.github/workflows/tauri-build.yml'

concurrency:
  group: tauri-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build WASM first — frontend needs it
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: cargo-bins/cargo-binstall@v1.12.3
      - run: cargo binstall wasm-pack --no-confirm
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm run build:wasm
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: |
            src/wasm/pkg/
            public/ace_dsp_wasm_bg.wasm
          retention-days: 1

  # Rust checks on the Tauri crate
  tauri-rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Show Rust version
        run: rustc --version && cargo --version
      - name: Check Tauri crate compiles
        id: cargo-check
        continue-on-error: true
        run: |
          cd src-tauri
          RUST_BACKTRACE=full cargo check 2>&1 | tee /tmp/cargo-check.log
      - name: Upload cargo check log
        if: steps.cargo-check.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: cargo-check-failure-log
          path: /tmp/cargo-check.log
          retention-days: 3
      - name: Fail if cargo check failed
        if: steps.cargo-check.outcome == 'failure'
        run: |
          echo "## cargo check output (last 50 lines):" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 /tmp/cargo-check.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "::error::cargo check failed — see uploaded artifact for full log"
          exit 1
      - name: Clippy lint
        if: steps.cargo-check.outcome == 'success'
        run: cd src-tauri && cargo clippy -- -D warnings
      - name: Format check
        if: steps.cargo-check.outcome == 'success'
        run: cd src-tauri && cargo fmt -- --check

  # Multi-platform Tauri builds
  tauri-build:
    needs: [build-wasm, tauri-rust-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundle-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          retention-days: 7
          if-no-files-found: warn
