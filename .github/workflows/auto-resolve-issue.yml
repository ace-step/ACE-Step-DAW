name: Auto-Resolve Issue

on:
  issues:
    types: [opened, assigned, labeled]

jobs:
  resolve:
    runs-on: self-hosted
    if: |
      contains(github.event.issue.labels.*.name, 'role: developer') ||
      contains(github.event.issue.labels.*.name, 'priority: P0') ||
      contains(github.event.issue.labels.*.name, 'priority: P1')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve issue with Claude Code CLI
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          ISSUE_TITLE=$(gh issue view $ISSUE_NUM --repo ${{ github.repository }} --json title --jq .title)
          ISSUE_BODY=$(gh issue view $ISSUE_NUM --repo ${{ github.repository }} --json body --jq .body | head -80)
          
          echo "Auto-resolving issue #$ISSUE_NUM: $ISSUE_TITLE"
          
          cd /Users/junmingong/.openclaw/workspace/acestep-daw
          git fetch origin && git reset --hard origin/main
          
          ~/.local/bin/claude --print --permission-mode bypassPermissions \
            "You are a senior developer for ACE-Step DAW.
          
          Fix issue #$ISSUE_NUM: $ISSUE_TITLE
          
          Details: $ISSUE_BODY
          
          1. Understand the issue, find relevant files
          2. Implement the fix/feature with tests
          3. npm run build && npx vitest run tests/unit/
          4. git checkout -b fix/issue-$ISSUE_NUM
          5. git -c user.name=ChuxiJ -c user.email=junmin@acestudio.ai add -A && git commit -m 'fix: resolve #$ISSUE_NUM'
          6. git push origin fix/issue-$ISSUE_NUM  
          7. gh pr create --repo ${{ github.repository }} --title 'fix: #$ISSUE_NUM — $ISSUE_TITLE' --body 'Closes #$ISSUE_NUM' --base main
          8. Request review: gh api repos/${{ github.repository }}/pulls/\$(gh pr view --json number --jq .number)/requested_reviewers -f reviewers[]=copilot[bot]"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
