name: Auto-Resolve Issue

on:
  issues:
    types: [opened, assigned, labeled]

jobs:
  resolve:
    runs-on: self-hosted
    if: |
      contains(github.event.issue.labels.*.name, 'role: developer') ||
      contains(github.event.issue.labels.*.name, 'priority: P0') ||
      contains(github.event.issue.labels.*.name, 'priority: P1')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve with context-aware Claude Code CLI
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          ISSUE_TITLE=$(gh issue view $ISSUE_NUM --repo ${{ github.repository }} --json title --jq .title)
          ISSUE_BODY=$(gh issue view $ISSUE_NUM --repo ${{ github.repository }} --json body --jq .body | head -80)
          CONTEXT=$(cat scripts/agents/AGENT_CONTEXT.md)
          
          cd /Users/junmingong/.openclaw/workspace/acestep-daw
          git fetch origin && git reset --hard origin/main
          
          ~/.local/bin/claude --print --permission-mode bypassPermissions --allowedTools 'Edit,Write,Read,Bash' \
            "$CONTEXT
          
          ---
          
          NOW IMPLEMENT THIS ISSUE:
          
          Issue #$ISSUE_NUM: $ISSUE_TITLE
          Details: $ISSUE_BODY
          
          IMPORTANT: First read CLAUDE.md and the relevant section of INTERACTION_DESIGN_GUIDE.md.
          Then implement following ALL the standards above.
          Create branch, build, test, push, create PR."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
